services:
  # Frontend — Next.js (URL: https://traduceri-matematica-7sh7.onrender.com)
  - type: web
    name: traduceri-matematica-7sh7
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx next start -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: PYTHON_API_URL
        value: https://traduceri-api.onrender.com
    plan: free
    region: frankfurt

  # Backend — Python API
  - type: web
    name: traduceri-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python dev_server.py
    envVars:
      - key: PYTHONUTF8
        value: "1"
      # API keys — set manually in Render Dashboard (Environment tab)
      # GOOGLE_AI_API_KEY, DEEPL_API_KEY, DEEPL_API_KEY2
      # GROQ_API_KEY, MISTRAL_API_KEY
    plan: free
    region: frankfurt
