<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: green chalkboard circle -->
  <circle cx="256" cy="256" r="256" fill="#2d5016"/>
  <circle cx="256" cy="256" r="240" fill="#1a3009" opacity="0.3"/>

  <!-- Triangle construction (main icon element) -->
  <polygon points="256,80 120,380 392,380" fill="none" stroke="#f0ebe3" stroke-width="8" stroke-linejoin="round"/>

  <!-- Angle arc at bottom-left -->
  <path d="M 155,380 A 40,40 0 0,0 140,348" fill="none" stroke="#f5d565" stroke-width="5"/>

  <!-- Translation arrow -->
  <line x1="180" y1="260" x2="332" y2="260" stroke="#f5d565" stroke-width="6" stroke-linecap="round"/>
  <polygon points="332,260 312,248 312,272" fill="#f5d565"/>

  <!-- "RO" text (left) -->
  <text x="140" y="268" font-size="36" fill="#f0ebe3" font-family="serif" font-weight="bold" text-anchor="middle">RO</text>

  <!-- "SK" text (right) -->
  <text x="372" y="268" font-size="36" fill="#7bb8d4" font-family="serif" font-weight="bold" text-anchor="middle">SK</text>

  <!-- Sigma symbol at top -->
  <text x="256" y="160" font-size="60" fill="#f5d565" font-family="Cambria,serif" text-anchor="middle" opacity="0.8">&#x2211;</text>

  <!-- Pi at bottom -->
  <text x="256" y="430" font-size="32" fill="#f0ebe3" font-family="Cambria,serif" text-anchor="middle" opacity="0.5">&#x03C0; &#x00B7; r&#x00B2;</text>

  <!-- Small math decorations -->
  <text x="90" y="180" font-size="22" fill="#f0ebe3" font-family="serif" opacity="0.3">&#x222B;</text>
  <text x="400" y="170" font-size="22" fill="#f0ebe3" font-family="serif" opacity="0.3">&#x0394;</text>
</svg>
